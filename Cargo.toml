[package]
name = "bevy_flash"
version = "0.1.0"
edition = "2021"
authors = ["傲娇小霖霖"]
license = "MIT OR Apache-2.0"
description = "A Bevy plugin for Flash Animation"

[dependencies]
swf_macro = { path = "./swf_macro" }
h263-rs-yuv = { path = "./h263-rs/yuv" }

bevy = { version = "0.15", default-features = false, features = [
    "bevy_asset",
    "bevy_sprite",
] }
smallvec = { version = "1.13.2", features = ["union"] }
wgpu = { version = "23", default-features = false }
jpeg-decoder = { version = "0.3.1", default-features = false }

thiserror = "1.0"
anyhow = "1.0"
bitflags = "2.5"
lyon_tessellation = "1.0"
indexmap = "2.7"
copyless = "0.1.5"
uuid = "1.10"
enum-map = "2.7.3"
png = "0.17.14"
gif = "0.13.1"
flate2 = "1.0.34"
swf = "0.2.1"


[dev-dependencies]
bevy = { version = "0.15" }


[profile.dev]
opt-level = 1
